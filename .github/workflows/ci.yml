name: CI

on:
  push:
  pull_request:

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install tooling
        run: python -m pip install --upgrade pip ruff mypy pytest
      - name: Ruff
        run: ruff check .
      - name: Mypy
        run: mypy
      - name: Pytest
        run: pytest
      - name: Compile sources
        run: python -m compileall custom_components
